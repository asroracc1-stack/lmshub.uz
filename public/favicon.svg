<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- High-contrast version for small browser tab icons -->
  <g transform="translate(0, 0)">
    <!-- Outer orbit ring - Thicker -->
    <ellipse cx="80" cy="80" rx="70" ry="25"
      fill="none" stroke="#10b981" stroke-width="8"
      transform="rotate(-35 80 80)"/>

    {/* Outer circle - Thicker */}
    <circle cx="80" cy="80" r="50" fill="none" stroke="#10b981" stroke-width="10"/>

    {/* Inner filled circle - Much Larger for visibility */}
    <circle cx="80" cy="80" r="30" fill="url(#tealGrad)"/>
    
    {/* Center white dot for maximum pop */}
    <circle cx="80" cy="80" r="10" fill="white" opacity="0.9"/>
  </g>
</svg>
