<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#240046"/>
      <stop offset="100%" stop-color="#0B0714"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E7C6FF"/>
      <stop offset="100%" stop-color="#9F86C0"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9F86C0"/>
      <stop offset="100%" stop-color="#240046"/>
    </linearGradient>
  </defs>

  <!-- Background circle for solid favicon -->
  <circle cx="80" cy="80" r="78" fill="url(#bgGrad)"/>

  <!-- Outer orbit ring -->
  <ellipse cx="80" cy="80" rx="62" ry="22"
    fill="none" stroke="url(#ringGrad)" stroke-width="5"
    transform="rotate(-35 80 80)" opacity="0.7"/>

  <!-- Main circle ring -->
  <circle cx="80" cy="80" r="48" fill="none" stroke="#9F86C0" stroke-width="6"/>

  <!-- Inner filled circle -->
  <circle cx="80" cy="80" r="30" fill="url(#innerGrad)"/>

  <!-- Center bright dot -->
  <circle cx="80" cy="80" r="12" fill="white" opacity="0.9"/>

  <!-- Orbit dot accent -->
  <circle cx="42" cy="33" r="6" fill="#9F86C0"/>
  <circle cx="42" cy="33" r="3.5" fill="#E7C6FF"/>
</svg>
