<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8F5FF"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9F86C0"/>
      <stop offset="100%" stop-color="#5A189A"/>
    </linearGradient>
    <linearGradient id="centerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5A189A"/>
      <stop offset="100%" stop-color="#240046"/>
    </linearGradient>
  </defs>

  <!-- White background circle -->
  <circle cx="80" cy="80" r="78" fill="url(#bgGrad)" stroke="#E8DDFB" stroke-width="2"/>

  <!-- Outer orbit ring -->
  <ellipse cx="80" cy="80" rx="58" ry="20"
    fill="none" stroke="url(#ringGrad)" stroke-width="5"
    transform="rotate(-35 80 80)" opacity="0.6"/>

  <!-- Main circle ring -->
  <circle cx="80" cy="80" r="44" fill="none" stroke="#9F86C0" stroke-width="5"/>

  <!-- Inner filled circle with gradient -->
  <circle cx="80" cy="80" r="30" fill="url(#centerGrad)"/>

  <!-- "LMS" text - white, bold, centered -->
  <text x="80" y="88" 
    font-family="Arial Black, Helvetica Neue, Arial, sans-serif" 
    font-size="22" font-weight="900" 
    fill="white" 
    text-anchor="middle" letter-spacing="1">LMS</text>

  <!-- Orbit dot accent - top left -->
  <circle cx="42" cy="35" r="7" fill="#9F86C0"/>
  <circle cx="42" cy="35" r="4" fill="#E7C6FF"/>

  <!-- Orbit dot accent - bottom right -->
  <circle cx="120" cy="120" r="5" fill="#9F86C0" opacity="0.7"/>
  <circle cx="120" cy="120" r="2.5" fill="#E7C6FF" opacity="0.8"/>
</svg>
