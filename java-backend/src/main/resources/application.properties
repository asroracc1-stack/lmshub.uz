spring.application.name=lmscrm-backend

# Database Configuration for Railway and Local Development
#
# Railway PostgreSQL exposes PGHOST, PGPORT, PGDATABASE, PGUSER, and PGPASSWORD.
# If you set SPRING_DATASOURCE_URL manually, it must be a JDBC URL, for example:
# jdbc:postgresql://host:5432/dbname
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:LMSHUB}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${PGUSER:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD:root}}
spring.datasource.driver-class-name=org.postgresql.Driver

# Use HikariCP explicitly and tune for high concurrency
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:3}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:1}
spring.datasource.hikari.connection-timeout=${HIKARI_CONN_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT:300000}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME:900000}
spring.datasource.hikari.pool-name=${HIKARI_POOL_NAME:LMSHikariPool}

# JPA & Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${FORMAT_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Liquibase
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=true

# Cache configuration (Caffeine) - default cache spec used by Spring
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=300s,initialCapacity=50

# Jackson (Snake Case for Frontend Compatibility)
spring.jackson.property-naming-strategy=SNAKE_CASE

# JWT Configuration (Secret must be at least 32 characters long for 256-bit security)
jwt.secret=${JWT_SECRET:change_this_to_a_long_random_secret_at_least_32_characters}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Server Configuration
server.port=${PORT:8080}
server.address=0.0.0.0
server.error.include-message=always
server.error.include-binding-errors=always

# App Site URL (used in Telegram inline button)
app.site.url=https://lmshub.uz

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Google OAuth 2.0
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=profile,email

# Gemini AI
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.keys=${GEMINI_API_KEYS:}

# Multipart File Upload limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
# Telegram Bot
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.bot.chat-id=${TELEGRAM_CHAT_ID:}
