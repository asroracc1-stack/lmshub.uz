spring.application.name=lmscrm-backend

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/LMSHUB}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# Use HikariCP explicitly and tune for high concurrency
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:80}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:20}
spring.datasource.hikari.connection-timeout=${HIKARI_CONN_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME:1800000}
spring.datasource.hikari.pool-name=${HIKARI_POOL_NAME:LMSHikariPool}

# JPA & Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Liquibase
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=true

# Cache configuration (Caffeine) - default cache spec used by Spring
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=5000,expireAfterWrite=300s,initialCapacity=200

# Jackson (Snake Case for Frontend Compatibility)
spring.jackson.property-naming-strategy=SNAKE_CASE

# JWT Configuration (Secret must be at least 32 characters long for 256-bit security)
jwt.secret=${JWT_SECRET:8d969eef6ecad3c29a3a629280e686cf0c3f5d5a86aff3ca12020c923adc6c92_very_long_secret_for_security}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Server Configuration
server.port=8081
server.error.include-message=always
server.error.include-binding-errors=always

# App Site URL (used in Telegram inline button)
app.site.url=https://lmshub.uz

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs



# Google OAuth 2.0
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=profile,email

# Gemini AI
gemini.api.key=${GEMINI_API_KEY:AIzaSyBVQ-3Spj5luRG-bTfRoPk5KNe0gcL8NiE}
gemini.api.keys=${GEMINI_API_KEYS:AIzaSyCBgSYpc0DMI30PI6UL_m-9sPoV4J_5yGo}

