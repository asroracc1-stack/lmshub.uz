spring.application.name=lmscrm-backend

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/lmscrm}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Liquibase
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=true

# Jackson (Snake Case for Frontend Compatibility)
spring.jackson.property-naming-strategy=SNAKE_CASE

# JWT Configuration (Secret must be at least 32 characters long for 256-bit security)
jwt.secret=${JWT_SECRET:8d969eef6ecad3c29a3a629280e686cf0c3f5d5a86aff3ca12020c923adc6c92_very_long_secret_for_security}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Server Configuration
server.port=8081
server.error.include-message=always
server.error.include-binding-errors=always

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs



# Google OAuth 2.0
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=profile,email

# Gemini AI
gemini.api.key=${GEMINI_API_KEY:your-gemini-key}
gemini.api.keys=${GEMINI_API_KEYS:your-gemini-keys}

# Multipart File Upload limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
# Telegram Bot
telegram.bot.token=${TELEGRAM_BOT_TOKEN:8732794145:AAGO5JluGCheTU_IotktAN6fpfGEOZFaJx4}
