# Database Configuration for Railway Production (PostgreSQL)
#
# Railway automatically provisions PostgreSQL variables: PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD.
# We build the JDBC connection URL dynamically. If SPRING_DATASOURCE_URL is set manually, we honor it.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${PGUSER}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD}}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernate Settings
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# HikariCP Connection Pool settings for Production (tuned for standard Railway starter containers)
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:5}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:2}
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.connection-timeout=30000

# Keep Liquibase migrations enabled in production
spring.liquibase.enabled=true
