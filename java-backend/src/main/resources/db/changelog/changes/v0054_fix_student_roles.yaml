databaseChangeLog:
  - changeSet:
      id: v0054_fix_student_roles
      author: asror
      changes:
        - sql:
            sql: >
              UPDATE public.users 
              SET role = 'USER' 
              WHERE role = 'STUDENT'
                AND (is_google_user = true 
                     OR (id NOT IN (SELECT student_id FROM payment_transactions WHERE status = 'APPROVED')
                         AND id NOT IN (SELECT user_id FROM user_subscriptions WHERE is_active = true)
                         AND organization_id IS NULL));
