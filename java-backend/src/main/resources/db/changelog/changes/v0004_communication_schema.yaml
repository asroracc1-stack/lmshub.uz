databaseChangeLog:
  - changeSet:
      id: v0004-1
      author: ai
      changes:
        - createTable:
            tableName: chat_threads
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
              - column:
                  name: title
                  type: varchar(255)
              - column:
                  name: is_group
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: group_id
                  type: uuid
                  constraints:
                    foreignKeyName: fk_chat_threads_group
                    references: groups(id)
              - column:
                  name: organization_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_chat_threads_organization
                    references: organizations(id)
              - column:
                  name: created_by
                  type: uuid
                  constraints:
                    foreignKeyName: fk_chat_threads_created_by
                    references: users(id)
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp

        - createTable:
            tableName: chat_participants
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
              - column:
                  name: thread_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_chat_participants_thread
                    references: chat_threads(id)
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_chat_participants_user
                    references: users(id)
              - column:
                  name: last_read_at
                  type: timestamp
              - column:
                  name: joined_at
                  type: timestamp
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: chat_participants
            columnNames: thread_id, user_id
            constraintName: uk_chat_participant

        - createTable:
            tableName: chat_messages
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
              - column:
                  name: thread_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_chat_messages_thread
                    references: chat_threads(id)
              - column:
                  name: sender_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_chat_messages_sender
                    references: users(id)
              - column:
                  name: body
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false

        - createTable:
            tableName: notifications
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_notifications_user
                    references: users(id)
              - column:
                  name: title
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: message
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: is_read
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false