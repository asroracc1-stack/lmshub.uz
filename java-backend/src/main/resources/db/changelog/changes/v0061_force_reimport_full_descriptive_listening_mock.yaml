databaseChangeLog:
  - changeSet:
      id: 0061-force-reimport-full-descriptive-listening-mock
      author: lmshub
      validCheckSum: ANY
      changes:
        - sql:
            splitStatements: true
            endDelimiter: ";"
            sql: |
              UPDATE public.exams
              SET title = 'IELTS Listening Practice 1 (Legacy Archived ' || id || ')',
                  is_active = false,
                  status = 'ARCHIVED'
              WHERE title LIKE 'IELTS Listening Practice 1%';
