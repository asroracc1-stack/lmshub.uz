databaseChangeLog:
  - changeSet:
      id: v0052-1
      author: ai
      preConditions:
        - onFail: MARK_RAN
        - not:
            - columnExists:
                tableName: exams
                columnName: status
      changes:
        - addColumn:
            tableName: exams
            columns:
              - column:
                  name: status
                  type: varchar(50)
                  defaultValue: "DRAFT"
                  constraints:
                    nullable: false
              - column:
                  name: sub_type
                  type: varchar(50)
              - column:
                  name: is_ai_imported
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: published_at
                  type: timestamp
  - changeSet:
      id: v0052-2
      author: ai
      changes:
        - createIndex:
            indexName: idx_exams_status_type
            tableName: exams
            columns:
              - column:
                  name: status
              - column:
                  name: type
        - createIndex:
            indexName: idx_exams_sub_type
            tableName: exams
            columns:
              - column:
                  name: sub_type
        - createIndex:
            indexName: idx_student_attempts_exam_student
            tableName: student_attempts
            columns:
              - column:
                  name: exam_id
              - column:
                  name: student_id
        - createIndex:
            indexName: idx_student_answers_attempt_question
            tableName: student_answers
            columns:
              - column:
                  name: attempt_id
              - column:
                  name: question_id
        - createIndex:
            indexName: idx_questions_exam_type
            tableName: questions
            columns:
              - column:
                  name: exam_id
              - column:
                  name: question_type
