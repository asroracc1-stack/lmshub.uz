databaseChangeLog:
  - changeSet:
      id: v0050-1
      author: antigravity
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: campuses
      changes:
        - createTable:
            tableName: campuses
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: organization_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_campuses_organization
                    references: organizations(id)
              - column:
                  name: name
                  type: varchar(150)
                  constraints:
                    nullable: false
              - column:
                  name: address
                  type: text
              - column:
                  name: city
                  type: varchar(100)
              - column:
                  name: phone
                  type: varchar(20)
              - column:
                  name: is_active
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false

