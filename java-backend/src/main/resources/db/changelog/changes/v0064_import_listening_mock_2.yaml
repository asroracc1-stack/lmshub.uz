databaseChangeLog:
  - changeSet:
      id: 0064-import-listening-mock-2
      author: lmshub
      validCheckSum: ANY
      changes:
        - sql:
            splitStatements: true
            endDelimiter: ";"
            sql: |
              UPDATE public.exams
              SET title = 'IELTS Listening Practice 2 (Legacy Archived ' || id || ')',
                  is_active = false,
                  status = 'ARCHIVED'
              WHERE title LIKE 'IELTS Listening Practice 2%';
