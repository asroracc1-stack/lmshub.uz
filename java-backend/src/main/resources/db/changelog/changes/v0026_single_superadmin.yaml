databaseChangeLog:
  - changeSet:
      id: v0026_single_superadmin_v4
      author: asror
      validCheckSum: ANY
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        not:
          - dbms:
              type: h2
      changes:
        # 1️⃣ Rename a duplicate super‑admin username (idempotent)
        - sql:
            sql: >
              UPDATE public.users
              SET username = 'demoted_' || SUBSTRING(CAST(id AS VARCHAR), 1, 8)
              WHERE username = 'asrorsuperadmin'
                AND id <> '00000000-0000-0000-0000-000000000001';
        # 2️⃣ Demote any other SUPER_ADMIN to ADMIN (idempotent)
        - sql:
            sql: >
              UPDATE public.users
              SET role = 'ADMIN'
              WHERE role = 'SUPER_ADMIN'
                AND id <> '00000000-0000-0000-0000-000000000001';
        # 3️⃣ Ensure the canonical super‑admin exists (upsert, idempotent)
        - sql:
            sql: >
              INSERT INTO public.users (id, username, email, password, role, full_name, active, coins, created_at)
              VALUES ('00000000-0000-0000-0000-000000000001'::uuid, 'asrorsuperadmin', 'asrorsuperadmin@lmshub.uz', '$2a$12$pznT0b3C7OZoUdmQMFDOGeMqyHFV.4WT.Q7GN9vUaXRwCWcSxqjWa', 'SUPER_ADMIN', 'Asror Super Admin', true, 0, CURRENT_TIMESTAMP)
              ON CONFLICT (id) DO UPDATE SET
                username = EXCLUDED.username,
                password = EXCLUDED.password,
                role     = EXCLUDED.role,
                active   = EXCLUDED.active;
      rollback:
        - sql:
            sql: >
              DELETE FROM public.users
              WHERE id = '00000000-0000-0000-0000-000000000001'
                AND username = 'asrorsuperadmin';
