databaseChangeLog:
  - changeSet:
      id: 0067-reimport-reading-mock-4-full-text
      author: lmshub
      validCheckSum: ANY
      changes:
        - sql:
            splitStatements: true
            endDelimiter: ";"
            sql: |
              UPDATE public.exams
              SET title = 'IELTS Reading Practice 4 (Truncated Archived ' || id || ')',
                  is_active = false,
                  status = 'ARCHIVED'
              WHERE title LIKE 'IELTS Reading Practice 4%'
                AND status != 'ARCHIVED';
