    title: `Into the Unknown – The Search for the Northwest Passage`,
    sub: null,
    html: `
<p><span class="pl">A</span>Prior to the 19th century, the Canadian Arctic region was largely unknown to Europeans, except for a relatively few whalers and fur hunters. However, for several centuries, explorers had sought to find a passage to the East via the ice-bound waterways of the north, to avoid the long and perilous journey via Cape Horn round the tip of South America and Africa's Cape of Good Hope. The route they sought, between the Atlantic and the North Pacific, was named the Northwest Passage.</p>
<p><span class="pl">B</span>Following the Napoleonic Wars in the early 19th century, there were many out-of-work naval officers, looking to find employment in the expanding British Empire. One of these was the naval surgeon John Richardson, born in Dumfries, Scotland, in 1787, who became a Fellow of the London Royal College of Surgeons in 1807, following a medical apprenticeship in Edinburgh. The training of medical personnel at this time involved studying a great deal of natural history, particularly of plants and their medicinal properties, and Richardson became a keen naturalist. It was this combination of knowledge and skills which brought him to the attention of Lieutenant John Franklin, who had been commissioned to explore the Northwest Passage in 1819. Richardson enthusiastically took the opportunity to travel with him with the object of collecting geological, plant and animal specimens.</p>
<p><span class="pl">C</span>At this time, the northern territories of Canada were dominated by two rival companies trading in animal furs and skins, who essentially governed this vast region. Staffed mainly by Scottish workers, but employing French voyageurs and Native American animal hunters, the violent trading war between these companies destabilised the whole of the region and the food stocks, which the expedition depended on, were simply unavailable. Nevertheless, Franklin's men succeeded in covering well over 1,000 miles in the first year of their anticipated 2-year expedition. They reached the confluence of the Coppermine and Yellow Rivers in 1820, despite temperatures of 40 degrees below freezing, while in summer the men were plagued by hordes of mosquitoes and biting flies.</p>
<p><span class="pl">D</span>It was the difficulty of obtaining food which made them seriously consider ending the expedition. Travelling several hundred miles over the waterlogged bog and tundra, the hungry and exhausted travellers were forced to feed on the only plentiful plants they could find - primitive lichens covering otherwise bare rocks. George Back, a member of Richardson's crew, showed great courage and selflessness in assisting the men stranded at Fort Enterprise, when he volunteered, together with some voyageurs, to undertake a winter journey of 500 miles to reach the camp of the Native American Chief Akaitcho. The chief immediately sent out two sledges loaded with meat to the starving explorers at Fort Enterprise.</p>
<p><span class="pl">E</span>Meanwhile, Richardson had agreed to stay behind with two sick members of the party, Hood and Hepburn, near the Coppermine River. The three emaciated men survived on insects and sheltered in a small tent, but continued to observe morning and evening religious prayers to maintain morale. Richardson was soon forced to make the most momentous decision of his life when he encountered one of the Iroquois Indian guides, attached to the main party, who claimed to have lost his way. A number of incidents convinced Richardson that the well-armed guide intended to kill the weakened party of Europeans for food. One morning, one of the men, Hood, was found dead with a gunshot wound to the head. Richardson did not hesitate: he killed the guide in similar fashion.</p>
<p><span class="pl">F</span>When Richardson and Hepburn later reached Fort Enterprise, they found the main party near to death from starvation and thoroughly demoralised, including their leader, Lieutenant Franklin. It was Richardson who then took charge, clearing out their filthy quarters and organising the sharing of what little sustenance they had, mainly consisting of old bones and scraps found outside. It was from this time that legends of making soup from old animal skins and leather moccasins emerged. Eventually, Chief Akaitcho's Indians arrived with their stores of food. They treated the weak and starved party with the utmost care, restoring them sufficiently to start the journey to Fort Providence on the Great Slave Lake within a week. There they stayed for five months with the Hudson's Bay Company, who looked after them very well. They were not able to return to England till the summer of 1822, having, by then, travelled some 5,500 miles by land and sea.</p>
<p><span class="pl">G</span>Richardson later accompanied a second Franklin expedition in the years 1825–27, which was much better organised, enabling him to consolidate his collections and observations and forming the basis of the very first comprehensive study of the natural history of the Arctic. Following his knighthood in 1846, he led an unsuccessful search expedition to determine what had happened to John Franklin's last Arctic expedition which had never returned and in which all died. It was not until the 1980s, when forensic science was applied to the buried corpses – perfectly intact in the ice – that it was found that they most probably died as a result of the latest technology of the time: tinned food. It was seen as the solution to maintaining the health and wellbeing of the expedition and thousands of tins were taken. Unfortunately, the lead used to seal the tins, which were of poor quality, contaminated the food inside and the explorers probably all died of lead poisoning.</p>`

let AP = 3, ANS = {}, pFS = 15, qFS = 14, selRange = null, secondsLeft = 20 * 60;

// ═══════════════ HELPERS ═══════════════
function ii(qn, w) {
  const v = ANS[qn] !== undefined ? ANS[qn] : '';
  return `<span style="white-space:nowrap;display:inline-flex;align-items:center;gap:4px"><span class="qn-lbl">${qn}</span><input class="ii" id="ii${qn}" style="width:${w || 100}px" value="${v.replace(/"/g, '&quot;')}" placeholder="Type answer" oninput="rec(${qn},this.value)"></span>`;
}

function rg(qn, opts) {
  return `<div class="rg" role="radiogroup">${opts.map(o => {
    const sel = ANS[qn] === o ? 'sel' : '';
    return `<label class="${sel}" onclick="rec(${qn},'${o}');updRG(this,${qn})"><span class="radio"></span>${o}</label>`;
  }).join('')}</div>`;
}

function updRG(el, qn) {
  el.parentNode.querySelectorAll('label').forEach(l => l.classList.remove('sel'));
  el.classList.add('sel');
}

function selBox(qn, opts) {
  let h = `<select class="q-sel" onchange="rec(${qn},this.value)"><option value="">— select an option —</option>`;
  opts.forEach(([v, l]) => { h += `<option value="${v}" ${ANS[qn] === v ? 'selected' : ''}>${l}</option>`; });
  return h + `</select>`;
}

const tfng = (qn, txt) => `<div class="q-item" id="q${qn}"><div class="q-row"><span class="q-num">${qn}</span><div class="q-text">${txt}</div></div>${rg(qn, ['TRUE', 'FALSE', 'NOT GIVEN'])}</div>`;

// ═══════════════ QUESTION HTML ═══════════════
function qP3() {
  const hdgOpts = [
    ['i', 'i. History of fur trading'],
    ['ii', 'ii. Returning to Canada'],
    ['iii', 'iii. A useful shortcut (Paragraph A example)'],
    ['iv', 'iv. Progress in the face of adversity'],
    ['v', 'v. Restoring order'],
    ['vi', 'vi. A difficult decision'],
    ['vii', 'vii. Rising unemployment'],
    ['viii', 'viii. The right man for the job'],
    ['ix', 'ix. Kill or be killed'],
    ['x', 'x. The need to seek help']
  ];
  const hdgQ = (qn, txt) => `<div class="q-item" id="q${qn}"><div class="q-row"><span class="q-num">${qn}</span><div class="q-text">${txt}</div></div>${selBox(qn, hdgOpts)}</div>`;

  return `
<div class="qs-block">
  <div class="qs-title">Questions 27–40</div>
  <div class="qs-sub">Questions 27–32</div>
  <div class="q-instr">Reading Passage 3 has seven paragraphs, <strong>A–G</strong>.<br>Choose the correct heading for paragraphs <strong>B–G</strong> from the list of headings below.</div>
  <div class="match-box">
    <div class="mi"><strong>List of Headings</strong></div>
    <div class="mi"><span class="ml">i</span> History of fur trading</div>
    <div class="mi"><span class="ml">ii</span> Returning to Canada</div>
    <div class="mi"><span class="ml">iii</span> A useful shortcut (Paragraph A example)</div>
    <div class="mi"><span class="ml">iv</span> Progress in the face of adversity</div>
    <div class="mi"><span class="ml">v</span> Restoring order</div>
    <div class="mi"><span class="ml">vi</span> A difficult decision</div>
    <div class="mi"><span class="ml">vii</span> Rising unemployment</div>
    <div class="mi"><span class="ml">viii</span> The right man for the job</div>
    <div class="mi"><span class="ml">ix</span> Kill or be killed</div>
    <div class="mi"><span class="ml">x</span> The need to seek help</div>
  </div>
  ${hdgQ(27, 'Paragraph B')}
  ${hdgQ(28, 'Paragraph C')}
  ${hdgQ(29, 'Paragraph D')}
  ${hdgQ(30, 'Paragraph E')}
  ${hdgQ(31, 'Paragraph F')}
  ${hdgQ(32, 'Paragraph G')}
</div>

<div class="qs-block">
  <div class="qs-sub">Questions 33–35</div>
  <div class="q-instr">Do the following statements agree with the information given in Reading Passage 3?<br>
  Choose <strong>TRUE</strong> if the statement agrees with the information, <strong>FALSE</strong> if the statement contradicts the information, or <strong>NOT GIVEN</strong> if there is no information on this.</div>
  ${tfng(33, 'Before finding the Northwest passage, the only option to travel from the Atlantic to the Pacific was over land.')}
  ${tfng(34, "John Richardson's medical studies influenced his interest in the exploration of nature.")}
  ${tfng(35, 'Conflict between rival companies led to the extinction of many species of animals in the area.')}
</div>

<div class="qs-block">
  <div class="qs-sub">Questions 36–40</div>
  <div class="q-instr">Complete the summary below. Choose <strong>NO MORE THAN TWO WORDS</strong> from the passage for each answer.</div>
  <div class="sum-box">
    <p>Travelling great distances across waterlogged terrain and eating only plants, such as wild ${ii(36, 100)}, left the group both exhausted and desperately in need of food.</p>
    <p>Help came in the form of ${ii(37, 100)} carrying food sent by Chief Akaitcho.</p>
    <p>Richardson had to make a momentous choice to save his weakened team from a well-armed guide who had inflicted a ${ii(38, 140)} to his teammate's head and wished to do the same to the others.</p>
    <p>At Fort Enterprise, Richardson found his team in an utterly ${ii(39, 130)} state. He fed them soup made from old bones and scraps until Chief Akaitcho arrived, bringing them food and restoring them to full health.</p>
    <p>Richardson went on other adventures with Franklin during which he consolidated his plant and animal specimens. However, Franklin later died from lead poisoning caused by the consumption of ${ii(40, 130)}.</p>
  </div>
</div>`;
}

// ═══════════════ NAVIGATION & CORE ENGINE ═══════════════
function sw(num) {
  AP = num;
  document.getElementById('pb-title').textContent = 'Part 3';
  document.getElementById('pb-sub').textContent = 'Read and answer questions 27–40.';
  renderP(num);
  renderQ(num);
  updPills();
}

function renderP(num) {
  const p = PASSAGES[num];
  let h = `<div class="p-title">${p.title}</div>`;
  if (p.sub) h += `<div class="p-sub">${p.sub}</div>`;
  h += `<div class="p-body" style="font-size:${pFS}px">${p.html}</div>`;
  document.getElementById('pass-pane').innerHTML = h;
  document.getElementById('pass-pane').scrollTop = 0;
}

function renderQ(num) {
  document.getElementById('q-pane').innerHTML = `<div class="q-wrap" style="font-size:${qFS}px">${qP3()}</div>`;
  document.getElementById('q-pane').scrollTop = 0;
}

function rec(qn, val) {
  if (val === '' || val === null) delete ANS[qn];
  else ANS[qn] = val;
  updPills();
}

function buildPills() {
  const wrap = document.getElementById('pw-3');
  let h = '';
  for (let q = 27; q <= 40; q++) {
    h += `<div class="qpill" id="pill-${q}" onclick="scrollToQ(${q})">${q}</div>`;
  }
  wrap.innerHTML = h;
}

function updPills() {
  for (let q = 27; q <= 40; q++) {
    const el = document.getElementById('pill-' + q);
    if (!el) continue;
    const hasAns = ANS[q] !== undefined && String(ANS[q]).trim() !== '';
    el.className = 'qpill' + (hasAns ? ' ans' : '');
  }
}

function scrollToQ(qNum) {
  const target = document.getElementById('q' + qNum) || document.getElementById('ii' + qNum);
  if (target) {
    target.scrollIntoView({ behavior: 'smooth', block: 'center' });
    if (target.tagName === 'INPUT') target.focus();
  }
}

function stepQ(dir) {
  let firstUnans = null;
  for (let q = 27; q <= 40; q++) {
    if (!ANS[q]) { firstUnans = q; break; }
  }
  if (firstUnans) scrollToQ(firstUnans);
}

// ═══════════════ TIMER ═══════════════
function startTimer() {
  setInterval(() => {
    if (secondsLeft <= 0) return;
    secondsLeft--;
    const m = Math.floor(secondsLeft / 60);
    const s = secondsLeft % 60;
    const mStr = m < 10 ? '0' + m : m;
    const sStr = s < 10 ? '0' + s : s;
    document.getElementById('timer-txt').textContent = `${mStr}:${sStr}`;
    document.getElementById('time-left').textContent = `${m} minutes remaining`;
  }, 1000);
}

// ═══════════════ HIGHLIGHT FEATURE ═══════════════
document.addEventListener('mouseup', checkSel);
function checkSel(e) {
  const pill = document.getElementById('hi-pill');
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) {
    if (e && e.target && e.target.id === 'hi-pill') return;
    pill.style.display = 'none';
    selRange = null;
    return;
  }
  const range = sel.getRangeAt(0);
  const container = range.commonAncestorContainer;
  const passPane = document.getElementById('pass-pane');
  if (passPane.contains(container)) {
    selRange = range;
    pill.style.left = e.clientX + 'px';
    pill.style.top = (e.clientY - 38) + 'px';
    pill.style.display = 'block';
  } else {
    pill.style.display = 'none';
    selRange = null;
  }
}

function doHighlight() {
  if (!selRange) return;
  const span = document.createElement('span');
  span.className = 'highlight';
  span.onclick = function() { removeHighlight(this); };
  try {
    selRange.surroundContents(span);
  } catch (err) {
    const contents = selRange.extractContents();
    span.appendChild(contents);
    selRange.insertNode(span);
  }
  document.getElementById('hi-pill').style.display = 'none';
  window.getSelection().removeAllRanges();
  selRange = null;
}

function removeHighlight(el) {
  const parent = el.parentNode;
  while (el.firstChild) parent.insertBefore(el.firstChild, el);
  parent.removeChild(el);
}

// ═══════════════ FONT & MENU ═══════════════
function toggleMenu() {
  document.getElementById('font-menu').classList.toggle('open');
}

function chFont(type, delta) {
  if (type === 'p') {
    pFS = Math.max(12, Math.min(22, pFS + delta));
    document.getElementById('ps-disp').textContent = pFS + 'px';
    document.getElementById('pass-pane').style.fontSize = pFS + 'px';
  } else {
    qFS = Math.max(12, Math.min(20, qFS + delta));
    document.getElementById('qs-disp').textContent = qFS + 'px';
    document.getElementById('q-pane').style.fontSize = qFS + 'px';
  }
}

function toggleFS() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen().catch(() => {});
  }
}

// ═══════════════ RESULTS MODAL ═══════════════
function norm(str) {
  if (!str) return '';
  return String(str).trim().toLowerCase().replace(/\s+/g, ' ');
}

function isCorrect(qNum, userVal) {
  if (!userVal) return false;
  const u = norm(userVal);
  const key = norm(AK[qNum]);
  if (u === key) return true;
  if (ALT[qNum]) {
    return ALT[qNum].some(a => norm(a) === u);
  }
  return false;
}

function showResults() {
  let totalCorrect = 0;
  for (let q = 27; q <= 40; q++) {
    if (isCorrect(q, ANS[q])) totalCorrect++;
  }
  
  let h = `
<div class="rm-head">
  <h2>IELTS Reading Test Results</h2>
</div>
<div class="total-strip">
  <div class="ts-score">${totalCorrect} / 14</div>
  <div class="ts-band">Score: <strong>${Math.round((totalCorrect / 14) * 100)}%</strong></div>
</div>
<div class="pr-section">
  <div class="pr-hdr">
    <h3>Part 3: ${pTitles[3]}</h3>
    <span class="s-badge ${totalCorrect >= 10 ? 'sb-g' : totalCorrect >= 6 ? 'sb-o' : 'sb-r'}">${totalCorrect} / 14</span>
  </div>
  <table class="rt">
    <thead>
      <tr>
        <th style="width:70px">Q#</th>
        <th>Your Answer</th>
        <th>Correct Answer</th>
        <th style="width:80px;text-align:center">Result</th>
      </tr>
    </thead>
    <tbody>`;

  for (let q = 27; q <= 40; q++) {
    const userAns = ANS[q] !== undefined ? ANS[q] : '—';
    const ok = isCorrect(q, ANS[q]);
    const rowCls = ok ? 'cr' : 'wr';
    const mark = ok ? '<span class="ck">✓</span>' : '<span class="cx">✕</span>';
    let correctDisplay = AK[q];
    if (ALT[q]) correctDisplay += ' / ' + ALT[q].join(' / ');

    h += `
      <tr class="${rowCls}">
        <td><strong>Q${q}</strong></td>
        <td>${userAns}</td>
        <td><strong>${correctDisplay}</strong></td>
        <td style="text-align:center">${mark}</td>
      </tr>`;
  }

  h += `</tbody></table></div><button id="close-res" onclick="closeRes()">Close Results</button>`;
  document.getElementById('res-modal').innerHTML = h;
  document.getElementById('res-overlay').classList.add('open');
}

function closeRes() {
  document.getElementById('res-overlay').classList.remove('open');
}

// ═══════════════ DIVIDER RESIZING ═══════════════
const divider = document.getElementById('divider');
const passPane = document.getElementById('pass-pane');
let isDragging = false;

divider.addEventListener('mousedown', (e) => {
  isDragging = true;
  divider.classList.add('dragging');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
});

document.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const containerWidth = document.getElementById('main').clientWidth;
  let newPassWidth = (e.clientX / containerWidth) * 100;
  if (newPassWidth < 20) newPassWidth = 20;
  if (newPassWidth > 80) newPassWidth = 80;
  passPane.style.width = newPassWidth + '%';
});

document.addEventListener('mouseup', () => {
  if (isDragging) {
    isDragging = false;
    divider.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  }
});

// ═══════════════ INITIALIZATION ═══════════════
window.onload = function() {
  sw(3);
  buildPills();
  startTimer();
};
</script>

</html>
